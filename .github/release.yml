changelog:
  exclude:
    labels:
      - skip-changelog
      - no-release-notes
  categories:
    - title: "🚨 Breaking Changes"
      labels:
        - breaking-change
    - title: "✨ Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Fixes"
      labels:
        - fix
        - bug
    - title: "🧰 Maintenance"
      labels:
        - chore
        - refactor
        - ci
        - test
    - title: "📚 Documentation"
      labels:
        - docs
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
