changelog:
  template: |
    ## Install

    ### Desktop app

    - **Windows**
      1. Download `liufs-viewer-windows.zip` from **Assets**.
      2. Extract the zip file.
      3. Run `liufs-viewer`.

    - **macOS**
      1. Download `liufs-viewer-macos.zip` from **Assets**.
      2. Extract the zip file.
      3. Run `liufs-viewer` from Terminal.

    - **Linux**
      1. Download `liufs-viewer-linux.tar.gz` from **Assets**.
      2. Extract it with `tar -xzf liufs-viewer-linux.tar.gz`.
      3. Run `./liufs-viewer`.

    ### Python package (`aerocfd`)

    - Install from release wheel (`*.whl`) with extras:
      ```bash
      pip install "<wheel-file-name>.whl[cli]"
      pip install "<wheel-file-name>.whl[app]"
      pip install "<wheel-file-name>.whl[full]"
      ```

    - Install from release source archive (`*.tar.gz`) with extras:
      ```bash
      pip install "<source-archive-name>.tar.gz[cli]"
      pip install "<source-archive-name>.tar.gz[app]"
      pip install "<source-archive-name>.tar.gz[full]"
      ```

    ## What's Changed
    $CHANGES

    ## Contributors
    $CONTRIBUTORS

  exclude:
    labels:
      - skip-changelog
      - no-release-notes
  categories:
    - title: "🚨 Breaking Changes"
      labels:
        - breaking-change
    - title: "✨ Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Fixes"
