        - fix
        - bug
    - title: "🧰 Maintenance"
      labels:
        - chore
        - refactor
        - ci
        - test
    - title: "📚 Documentation"
      labels:
        - docs
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
