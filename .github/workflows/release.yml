name: Build and Publish Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (for example v1.2.3)"
        required: true
        type: string
      build_ref:
        description: "Commit SHA to build from (optional; defaults to main HEAD)"
        required: false
        type: string

jobs:
  prepare-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/stamp-'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      build_ref: ${{ steps.resolve.outputs.build_ref }}

    steps:
      - name: Resolve release metadata
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ github.event.inputs.release_tag }}"
            if [ -n "${{ github.event.inputs.build_ref }}" ]; then
              build_ref="${{ github.event.inputs.build_ref }}"
            else
              tag_commit=$(git ls-remote --refs origin "refs/tags/$release_tag^{}" | awk '{print $1}')
              if [ -z "$tag_commit" ]; then
                tag_commit=$(git ls-remote --refs origin "refs/tags/$release_tag" | awk '{print $1}')
              fi

              if [ -n "$tag_commit" ]; then
                build_ref="$tag_commit"
              else
                build_ref="${{ github.sha }}"
              fi
            fi
          else
            release_tag=$(printf '%s' "${{ github.event.pull_request.title }}" | sed -n 's/^chore(release): stamp version //p')
            build_ref="${{ github.event.pull_request.merge_commit_sha }}"
          fi

          if [ -z "$release_tag" ]; then
            echo "Unable to resolve release tag." >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "build_ref=$build_ref" >> "$GITHUB_OUTPUT"

      - name: Check out merge commit
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.resolve.outputs.build_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Retarget release tag to merge commit
        run: |
          git fetch --tags
          git tag -f "${{ steps.resolve.outputs.release_tag }}" "${{ steps.resolve.outputs.build_ref }}"
          git push origin "refs/tags/${{ steps.resolve.outputs.release_tag }}" --force

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: liufs-viewer-windows
            output_file: dist/liufs-viewer-windows.zip
            build_script: ./scripts/build_windows.ps1

          - os: macos-latest
            artifact_name: liufs-viewer-macos
            output_file: dist/liufs-viewer-macos.zip
            build_script: ./scripts/build_macos.sh

          - os: ubuntu-latest
            artifact_name: liufs-viewer-linux
            output_file: dist/liufs-viewer-linux.tar.gz
            build_script: ./scripts/build_linux.sh

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.build_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libglib2.0-0

      - name: Build app
        run: ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}

  build-aerocfd-wheel:
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.build_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build aerocfd wheel
        run: |
          pyproject-build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: aerocfd-wheel
          path: dist/

  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: build-aerocfd-wheel
    permissions:
      id-token: write  # Required for OIDC trusted publisher

    steps:
      - name: Download aerocfd artifacts
        uses: actions/download-artifact@v4
        with:
          name: aerocfd-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-release-assets:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build
      - build-aerocfd-wheel
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.build_ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: |
            release-assets/liufs-viewer-windows/liufs-viewer-windows.zip
            release-assets/liufs-viewer-macos/liufs-viewer-macos.zip
            release-assets/liufs-viewer-linux/liufs-viewer-linux.tar.gz
            release-assets/aerocfd-wheel/*.whl
            release-assets/aerocfd-wheel/*.tar.gz