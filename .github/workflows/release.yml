name: Build desktop app

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      build_ref: ${{ steps.set-ref.outputs.build_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stamp app version
        run: |
          python scripts/set_app_version.py "${{ github.event.release.tag_name || github.ref_name }}"

      - name: Commit and push stamped version
        id: commit-version
        if: github.event_name == 'release'
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/version.py app/__init__.py pyproject.toml README.md simulation_compressor/README.md PACKAGING.md
          git commit -m "chore(release): stamp version ${{ github.event.release.tag_name }}"
          git push origin "HEAD:${{ github.event.release.target_commitish }}"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Set build ref output
        id: set-ref
        run: |
          echo "build_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: liufs-viewer-windows
            output_file: dist/liufs-viewer-windows.zip
            build_script: ./scripts/build_windows.ps1

          - os: macos-latest
            artifact_name: liufs-viewer-macos
            output_file: dist/liufs-viewer-macos.zip
            build_script: ./scripts/build_macos.sh

          - os: ubuntu-latest
            artifact_name: liufs-viewer-linux
            output_file: dist/liufs-viewer-linux.tar.gz
            build_script: ./scripts/build_linux.sh

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.build_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libglib2.0-0

      - name: Build app
        run: ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}

  build-simulation-compressor-wheel:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: prepare-version

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.build_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build simulation_compressor wheel
        run: |
          python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: simulation-compressor-wheel
          path: dist/

  publish-release-assets:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-simulation-compressor-wheel
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/liufs-viewer-windows/liufs-viewer-windows.zip
            release-assets/liufs-viewer-macos/liufs-viewer-macos.zip
            release-assets/liufs-viewer-linux/liufs-viewer-linux.tar.gz
            release-assets/simulation-compressor-wheel/*.whl
            release-assets/simulation-compressor-wheel/*.tar.gz