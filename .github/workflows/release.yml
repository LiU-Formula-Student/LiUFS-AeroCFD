name: Build desktop app

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      build_ref: ${{ steps.set-ref.outputs.build_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stamp app version
        run: |
          python scripts/set_app_version.py "${{ github.event.release.tag_name || github.ref_name }}"

      - name: Prepare stamped release branch
        id: prepare-branch
        if: github.event_name == 'release'
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          stamp_branch="release/stamp-${{ github.event.release.tag_name }}-${{ github.run_id }}"

          git checkout -b "$stamp_branch"
          git add aerocfd_app/version.py aerocfd_app/__init__.py pyproject.toml README.md aerocfd_cli/README.md docs/PACKAGING.md
          git commit -m "chore(release): stamp version ${{ github.event.release.tag_name }}"
          git push origin "HEAD:$stamp_branch"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=$stamp_branch" >> "$GITHUB_OUTPUT"

      - name: Open release stamping PR
        id: open-pr
        if: github.event_name == 'release' && steps.prepare-branch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_branch="${{ github.event.release.target_commitish || 'main' }}"

          pr_url=$(gh pr create \
            --base "$target_branch" \
            --head "${{ steps.prepare-branch.outputs.branch_name }}" \
            --title "chore(release): stamp version ${{ github.event.release.tag_name }}" \
            --body "Automated version stamping for release ${{ github.event.release.tag_name }}.")

          pr_number=$(gh pr view "$pr_url" --json number --jq '.number')
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable PR auto-merge (merge queue compatible)
        if: github.event_name == 'release' && steps.prepare-branch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ steps.open-pr.outputs.pr_number }}" --auto --merge

      - name: Wait for release stamping PR merge
        id: wait-merge
        if: github.event_name == 'release' && steps.prepare-branch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="${{ steps.open-pr.outputs.pr_number }}"

          for _ in $(seq 1 90); do
            merged_at=$(gh pr view "$pr_number" --json mergedAt --jq '.mergedAt')
            if [ "$merged_at" != "null" ] && [ -n "$merged_at" ]; then
              merge_commit=$(gh pr view "$pr_number" --json mergeCommit --jq '.mergeCommit.oid')
              echo "merge_commit=$merge_commit" >> "$GITHUB_OUTPUT"
              echo "Release stamping PR merged at $merged_at"
              exit 0
            fi
            sleep 10
          done

          echo "Timed out waiting for PR #$pr_number to merge." >&2
          exit 1

      - name: Retarget release tag to merged commit
        if: github.event_name == 'release' && steps.prepare-branch.outputs.changed == 'true'
        run: |
          git fetch --tags
          git tag -f "${{ github.event.release.tag_name }}" "${{ steps.wait-merge.outputs.merge_commit }}"
          git push origin "refs/tags/${{ github.event.release.tag_name }}" --force

      - name: Set build ref output
        id: set-ref
        run: |
          if [ "${{ github.event_name }}" = "release" ] && [ "${{ steps.prepare-branch.outputs.changed }}" = "true" ]; then
            echo "build_ref=${{ steps.wait-merge.outputs.merge_commit }}" >> "$GITHUB_OUTPUT"
          else
            echo "build_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: liufs-viewer-windows
            output_file: dist/liufs-viewer-windows.zip
            build_script: ./scripts/build_windows.ps1

          - os: macos-latest
            artifact_name: liufs-viewer-macos
            output_file: dist/liufs-viewer-macos.zip
            build_script: ./scripts/build_macos.sh

          - os: ubuntu-latest
            artifact_name: liufs-viewer-linux
            output_file: dist/liufs-viewer-linux.tar.gz
            build_script: ./scripts/build_linux.sh

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.build_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libglib2.0-0

      - name: Build app
        run: ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}

  build-aerocfd-wheel:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: prepare-version

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.build_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build aerocfd wheel
        run: |
          pyproject-build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: aerocfd-wheel
          path: dist/

  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: build-aerocfd-wheel
    if: github.event_name == 'release'
    permissions:
      id-token: write  # Required for OIDC trusted publisher

    steps:
      - name: Download aerocfd artifacts
        uses: actions/download-artifact@v4
        with:
          name: aerocfd-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-release-assets:
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - build
      - build-aerocfd-wheel
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.build_ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/liufs-viewer-windows/liufs-viewer-windows.zip
            release-assets/liufs-viewer-macos/liufs-viewer-macos.zip
            release-assets/liufs-viewer-linux/liufs-viewer-linux.tar.gz
            release-assets/aerocfd-wheel/*.whl
            release-assets/aerocfd-wheel/*.tar.gz